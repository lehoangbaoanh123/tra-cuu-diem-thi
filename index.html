<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tra Cứu Điểm Thi THPT 2026 - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: rgba(229, 231, 235, 0.8);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            --glass-blur: blur(16px);
        }
        
        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --bg-color: #111827;
            --card-bg: rgba(31, 41, 55, 0.75);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: rgba(75, 85, 99, 0.6);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Particle Background Effect */
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .shape { position: absolute; filter: blur(60px); opacity: 0.4; border-radius: 50%; }
        .shape-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #a78bfa; animation: float 10s infinite alternate; }
        .shape-2 { bottom: -10%; right: -5%; width: 400px; height: 400px; background: #60a5fa; animation: float 8s infinite alternate-reverse; }
        
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* Navbar / Theme Toggle */
        .navbar { padding: 20px 40px; display: flex; justify-content: flex-end; }
        .theme-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 30px; cursor: pointer; color: var(--text-main); backdrop-filter: var(--glass-blur); font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Main Container */
        .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header-badge { display: inline-block; padding: 6px 16px; background: rgba(99, 102, 241, 0.1); color: var(--primary); border-radius: 20px; font-weight: 600; font-size: 14px; margin-bottom: 15px; letter-spacing: 0.5px; text-transform: uppercase; }
        .header h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; background: linear-gradient(135deg, var(--primary), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Glassmorphism Search Box */
        .search-container { background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; padding: 12px; display: flex; gap: 12px; max-width: 600px; margin: 0 auto 30px; box-shadow: var(--shadow); }
        .search-container input { flex: 1; background: transparent; border: none; padding: 15px 20px; font-size: 18px; color: var(--text-main); outline: none; font-weight: 500; }
        .search-container input::placeholder { color: var(--text-muted); font-weight: 400; }
        .search-container button { background: var(--primary); color: white; border: none; padding: 15px 35px; font-size: 16px; font-weight: 600; border-radius: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .search-container button:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }

        /* Loading UI */
        .loading-wrapper { display: none; text-align: center; padding: 40px 0; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(99, 102, 241, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        .loading-text { font-size: 16px; color: var(--text-muted); font-weight: 500; animation: pulse 1.5s infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Error/Alert */
        .alert { display: none; background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; color: #ef4444; padding: 16px 20px; border-radius: 8px; max-width: 600px; margin: 0 auto 30px; font-weight: 500; }

        /* Result Card (Modern Grid/Flex) */
        .result-board { display: none; background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; padding: 40px; box-shadow: var(--shadow); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .board-layout { display: flex; gap: 40px; align-items: flex-start; }
        
        /* Cột thông tin thí sinh */
        .student-profile { flex: 0 0 280px; text-align: center; padding: 30px 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px solid var(--border-color); }
        .avatar-ring { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #a855f7); padding: 4px; }
        .avatar-inner { width: 100%; height: 100%; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .avatar-inner svg { width: 60px; height: 60px; fill: var(--primary); }
        
        .profile-label { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 5px; }
        .profile-sbd { font-size: 32px; font-weight: 800; color: var(--text-main); font-family: monospace; }
        
        .stats-box { margin-top: 25px; padding-top: 25px; border-top: 1px dashed var(--border-color); display: flex; justify-content: space-between; }
        .stat-item { text-align: center; flex: 1; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

        /* Cột Bảng điểm */
        .score-content { flex: 1; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .score-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .score-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .score-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.2); }
        .subject-name { font-size: 16px; font-weight: 600; color: var(--text-muted); }
        .subject-mark { font-size: 24px; font-weight: 800; color: var(--text-main); }

        /* Media Queries cho Mobile */
        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .search-container { flex-direction: column; border-radius: 16px; padding: 15px; }
            .search-container button { width: 100%; justify-content: center; }
            
            .board-layout { flex-direction: column; }
            .student-profile { flex: 1; width: 100%; }
            .score-grid { grid-template-columns: 1fr 1fr; }
            .result-board { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="navbar">
        <button class="theme-btn" onclick="toggleTheme()" id="themeToggleBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <span>Dark Mode</span>
        </button>
    </div>

    <div class="container">
        
        <div class="header">
            <span class="header-badge">Hệ thống Tra cứu Dữ liệu</span>
            <h1>ĐIỂM THI TỐT NGHIỆP THPT 2026</h1>
            <p style="color: var(--text-muted); font-size: 16px;">Tốc độ cao • Không giới hạn • Bypass HTTP 429</p>
        </div>

        <div class="search-container">
            <input type="text" id="sbdInput" placeholder="Nhập số báo danh của bạn (VD: 01084025)..." onkeypress="if(event.key === 'Enter') executeSearch()" autocomplete="off" maxlength="8">
            <button onclick="executeSearch()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Tra Cứu Ngay
            </button>
        </div>

        <div id="errorAlert" class="alert"></div>

        <div id="loadingUI" class="loading-wrapper">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Đang khởi tạo kết nối mạng...</div>
        </div>

        <div id="resultBoard" class="result-board">
            <div class="board-layout">
                
                <div class="student-profile">
                    <div class="avatar-ring">
                        <div class="avatar-inner">
                            <svg viewBox="0 0 24 24"><path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3ZM18.82 9L12 12.72L5.18 9L12 5.28L18.82 9Z"></path></svg>
                        </div>
                    </div>
                    <div class="profile-label">Số báo danh</div>
                    <div class="profile-sbd" id="renderSbd">------</div>
                    
                    <div class="stats-box">
                        <div class="stat-item">
                            <div class="stat-val" id="renderTotal">0.0</div>
                            <div class="stat-lbl">Tổng Điểm</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-val" id="renderAvg">0.0</div>
                            <div class="stat-lbl">Trung Bình</div>
                        </div>
                    </div>
                </div>

                <div class="score-content">
                    <h3 class="section-title">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        Bảng Điểm Chi Tiết
                    </h3>
                    
                    <div class="score-grid" id="scoreGrid">
                        </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Cấu hình Key Map với tên môn học chuẩn 2026
        const subjectMap = {
            "TOAN": "Toán", 
            "VA": "Ngữ Văn", 
            "LI": "Vật Lý",
            "HO": "Hóa Học", 
            "SI": "Sinh Học", 
            "SU": "Lịch Sử",
            "DI": "Địa Lý", 
            "KTPL": "Giáo Dục KTPL", 
            "NN": "Ngoại Ngữ",
            "MON_NN": "Ngoại Ngữ"
        };

        // Dark Mode Logic
        function toggleTheme() {
            const body = document.body;
            const btnSpan = document.querySelector('#themeToggleBtn span');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btnSpan.innerText = 'Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                btnSpan.innerText = 'Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }
        
        // Restore theme on load
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        // Loading text animation
        const loadingTexts = [
            "Đang tạo kết nối trực tiếp đến Tuổi Trẻ...", 
            "Bypass hệ thống CORS...",
            "Đang phân tích dữ liệu trả về..."
        ];

        async function executeSearch() {
            const inputEle = document.getElementById('sbdInput');
            let sbd = inputEle.value.trim();
            const uiBoard = document.getElementById('resultBoard');
            const uiLoader = document.getElementById('loadingUI');
            const uiError = document.getElementById('errorAlert');
            const loadingText = document.getElementById('loadingText');

            // Reset UI
            uiBoard.style.display = 'none';
            uiError.style.display = 'none';
            
            // Lọc ra số
            sbd = sbd.replace(/[^0-9]/g, '');
            inputEle.value = sbd;

            if (!sbd) {
                uiError.innerHTML = "⚠️ Vui lòng nhập Số báo danh hợp lệ (chỉ chứa số).";
                uiError.style.display = 'block';
                inputEle.focus();
                return;
            }

            sbd = sbd.padStart(8, '0');
            inputEle.value = sbd;

            // Hiện Loading với hiệu ứng text thay đổi
            uiLoader.style.display = 'block';
            let txtIndex = 0;
            let textInterval = setInterval(() => {
                txtIndex = (txtIndex + 1) % loadingTexts.length;
                loadingText.innerText = loadingTexts[txtIndex];
            }, 800);

            try {
                // Gọi tới API Tuổi Trẻ trực tiếp vì họ mở CORS
                const response = await fetch(`https://s6.tuoitre.vn/api/diem-thi-thpt.htm?sbd=${sbd}&year=2026`);
                
                clearInterval(textInterval);

                if (!response.ok) {
                    if (response.status === 429) {
                        uiLoader.style.display = 'none';
                        uiError.innerHTML = "⚠️ <b>Hệ thống đang quá tải (Lỗi 429):</b> Máy chủ Tuổi Trẻ tạm thời chặn do quá nhiều yêu cầu. Vui lòng thử lại sau 30 giây.";
                        uiError.style.display = 'block';
                        return;
                    }
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();

                if (data.success && data.data && data.data.length > 0) {
                    const scores = data.data[0];
                    renderResult(scores);
                } else {
                    uiLoader.style.display = 'none';
                    uiError.innerHTML = "⚠️ Không tìm thấy kết quả. Số báo danh này có thể không tồn tại hoặc chưa được cập nhật điểm.";
                    uiError.style.display = 'block';
                }

            } catch (error) {
                clearInterval(textInterval);
                uiLoader.style.display = 'none';
                
                let errorMsg = "⚠️ <b>Lỗi kết nối:</b> Có lỗi xảy ra khi truy xuất dữ liệu từ máy chủ tra cứu.";
                if (error.message === 'Failed to fetch' || error.name === 'TypeError') {
                    errorMsg = "⚠️ <b>Lỗi CORS hoặc Mạng (Failed to fetch):</b> Không thể lấy điểm trực tiếp do mạng hoặc trình duyệt chặn CORS. Vui lòng upload web này lên Github Pages hoặc chạy qua localhost (Live Server) để tránh bị trình duyệt chặn nhé anh zai!";
                }
                
                uiError.innerHTML = errorMsg;
                uiError.style.display = 'block';
                console.error("Fetch Error:", error);
            }
        }

        function renderResult(scores) {
            const uiLoader = document.getElementById('loadingUI');
            const uiBoard = document.getElementById('resultBoard');
            const grid = document.getElementById('scoreGrid');
            
            // Cập nhật SBD
            document.getElementById('renderSbd').innerText = scores.SOBAODANH;

            let html = '';
            let total = 0;
            let count = 0;

            // Xử lý từng môn học
            for (const [code, name] of Object.entries(subjectMap)) {
                if (scores[code] !== undefined && scores[code] !== null && scores[code] !== "") {
                    let point = parseFloat(scores[code]);
                    
                    // Format điểm: Môn văn điểm đẹp (e.g. 7.25), các môn khác giữ nguyên
                    let displayPoint = Number.isInteger(point) ? point : point.toFixed(2).replace(/\.00$/, '');
                    
                    total += point;
                    count++;

                    html += `
                    <div class="score-card">
                        <span class="subject-name">${name}</span>
                        <span class="subject-mark">${displayPoint}</span>
                    </div>`;
                }
            }

            // Tính toán thống kê
            if(count > 0) {
                document.getElementById('renderTotal').innerText = total.toFixed(2).replace(/\.00$/, '');
                document.getElementById('renderAvg').innerText = (total / count).toFixed(2);
            }

            grid.innerHTML = html;

            // Chuyển đổi trạng thái UI
            setTimeout(() => {
                uiLoader.style.display = 'none';
                uiBoard.style.display = 'block';
            }, 500); // Thêm delay nhỏ để thấy hiệu ứng loading chuyên nghiệp
        }
    </script>
</body>
</html>
